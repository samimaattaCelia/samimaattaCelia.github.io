<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testing referencing math equations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible&display=swap"
      rel="stylesheet"
    />
    
    <style>
      :root {
        font-size: 16px;
        font-family: "Atkinson Hyperlegible", sans-serif;

        --primary-color: #3fae29;
      }

      html {
        max-width: 700px;
      }

      body {
        font-size: 1.2rem;
        overflow-x: auto;
      }

      a[href]:is(:focus, :hover) {
        outline: 3px solid black;
      }

      .note {
        border: solid 1px var(--primary-color);
        border-left: solid 10px var(--primary-color);
        padding: 0 1rem;
      }

      math {
        margin-block-start: 1rem;
      }

      /* math[display~='block'] {
overflow-x: auto;
overflow-y: hidden;
} */

div:has(math[display~='block']) {
overflow-x: auto;
overflow-y: hidden;
}

.math-block-wrapper {
overflow-x: auto;
overflow-y: hidden;
}
    </style>
  </head>
  <body>
    <h1>Tests for math equations</h1>
    <h2><code>math</code> elements with <code>overlow-x: auto;</code></h2>
    <p><div class="math-block-wrapper">
      <math display="block" xmlns="http://www.w3.org/1998/Math/MathML" alttext="{\displaystyle P(x)=x^{n}+b_{1}x^{n-1}+\cdots +b_{n-1}x+b_{n}=(x-x_{1})\cdots (x-x_{n}).}">
  <semantics>
    <mrow class="MJX-TeXAtom-ORD">
      <mstyle displaystyle="true" scriptlevel="0">
        <mi>P</mi>
        <mo stretchy="false">(</mo>
        <mi>x</mi>
        <mo stretchy="false">)</mo>
        <mo>=</mo>
        <msup>
          <mi>x</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mi>n</mi>
          </mrow>
        </msup>
        <mo>+</mo>
        <msub>
          <mi>b</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mn>1</mn>
          </mrow>
        </msub>
        <msup>
          <mi>x</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mi>n</mi>
            <mo>−<!-- − --></mo>
            <mn>1</mn>
          </mrow>
        </msup>
        <mo>+</mo>
        <mo>⋯<!-- ⋯ --></mo>
        <mo>+</mo>
        <msub>
          <mi>b</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mi>n</mi>
            <mo>−<!-- − --></mo>
            <mn>1</mn>
          </mrow>
        </msub>
        <mi>x</mi>
        <mo>+</mo>
        <msub>
          <mi>b</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mi>n</mi>
          </mrow>
        </msub>
        <mo>=</mo>
        <mo stretchy="false">(</mo>
        <mi>x</mi>
        <mo>−<!-- − --></mo>
        <msub>
          <mi>x</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mn>1</mn>
          </mrow>
        </msub>
        <mo stretchy="false">)</mo>
        <mo>⋯<!-- ⋯ --></mo>
        <mo stretchy="false">(</mo>
        <mi>x</mi>
        <mo>−<!-- − --></mo>
        <msub>
          <mi>x</mi>
          <mrow class="MJX-TeXAtom-ORD">
            <mi>n</mi>
          </mrow>
        </msub>
        <mo stretchy="false">)</mo>
        <mo>.</mo>
      </mstyle>
    </mrow>
    <annotation encoding="application/x-tex">{\displaystyle P(x)=x^{n}+b_{1}x^{n-1}+\cdots +b_{n-1}x+b_{n}=(x-x_{1})\cdots (x-x_{n}).}</annotation>
  </semantics>
</math></div></p>
  </body>
</html>
